services:
  foundryvtt-mcp:
    container_name: foundryvtt-mcp
    image: foundryvtt-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    stdin_open: true
    environment:
      FOUNDRY_URL: ${FOUNDRY_URL}
      FOUNDRY_USERNAME: ${FOUNDRY_USERNAME}
      FOUNDRY_PASSWORD: ${FOUNDRY_PASSWORD}
      FOUNDRY_API_KEY: ${FOUNDRY_API_KEY:-}
      FOUNDRY_USER_ID: ${FOUNDRY_USER_ID:-}
      FOUNDRY_SOCKET_PATH: ${FOUNDRY_SOCKET_PATH:-/socket.io/}
      FOUNDRY_TIMEOUT: ${FOUNDRY_TIMEOUT:-10000}
      FOUNDRY_RETRY_ATTEMPTS: ${FOUNDRY_RETRY_ATTEMPTS:-3}
      FOUNDRY_RETRY_DELAY: ${FOUNDRY_RETRY_DELAY:-1000}
      MCP_SERVER_NAME: ${MCP_SERVER_NAME:-foundryvtt-mcp}
      MCP_SERVER_VERSION: ${MCP_SERVER_VERSION:-1.0.1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-production}
    restart: unless-stopped
